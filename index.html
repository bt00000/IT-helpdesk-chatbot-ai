<!-- simple html file for chatbot -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IT Helpdesk Chatbot</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>IT Helpdesk Chatbot</h1>
      <p>Rule-based support for common issues, with deeper analysis for more complex problems.</p>
    </div>

    <div id="chatbox" class="chatbox"></div>
    <div id="quickReplies" class="quick-replies"></div>

    <div class="input-area">
      <input id="userInput" type="text" maxlength="800" placeholder="Type your message here..." />      <button id="sendBtn">Send</button>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
